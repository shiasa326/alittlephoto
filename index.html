<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>確認事項</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>確認事項</h1>

    <p class="intro">
      こちらでは相違がないようにあらかじめ条件などを記載しております<br>
      1度目を通していただければと思っています
    </p>

    <div class="section notice">
      <p class="notice-main">有償</p>
      <p class="price">2〜3h &frasl; 5,000 〜</p>
      <p class="notice-sub">衣装の貸し出し費や撮影費になります</p>
    </div>

    <div class="section">
      <ul class="checklist">
        <li>インスタの他、Xの投稿が問題ないか</li>
<li>作風がカメラマン側に寄っても問題ないか</li>
        <li>AI改変は基本禁止</li>
        <li>数枚ファンサイトに投稿可能か（相談可）</li>
      </ul>
    </div>

    <div class="section">
      <p class="section-title">衣装希望の方</p>
      <ul class="checklist">
        <li>当方男性のため、それでも衣装を着ることに問題はないか</li>
      </ul>
    </div>

    <div class="costume-link-wrap">
      <a href="衣装.html" class="costume-link">衣装はこちら &rarr;</a>
    </div>
  </div>
</body>
</html>
