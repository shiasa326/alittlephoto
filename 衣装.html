<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>衣装一覧</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-link">&larr; 戻る</a>

    <h1>衣装一覧</h1>

    <div class="costume-item">
      <p class="costume-number">衣装 ①</p>
      <div class="costume-images">
        <img src="メイド画像/画像①.jpg" alt="衣装① 画像1">
        <img src="メイド画像/画像②.jpg" alt="衣装① 画像2">
      </div>
      <div class="size-table">
        <span class="size-label">身長 / バスト / ウェスト / ヒップ</span>
        <span class="size-value">165–170 / 95–103 / 75–81 / 99–104</span>
      </div>
      <p class="costume-desc">
        全円のクラシカルメイド<br>
        <span class="note">※ エプロンは選べます</span>
      </p>
    </div>

    <div class="costume-item">
      <p class="costume-number">衣装 ②</p>
      <div class="costume-images single">
        <img src="メイド画像/画像③.jpg" alt="衣装② 画像">
      </div>
      <div class="size-table">
        <span class="size-label">身長 / バスト / ウェスト / ヒップ</span>
        <span class="size-value">160–165 / 88–95 / 66–75 / 93–99</span>
      </div>
      <p class="costume-desc">
        全円のクラシカルメイド<br>
        <span class="note">※ エプロンは選べます &nbsp; ※ 現状サンプル写真です</span>
      </p>
    </div>

    <div class="costume-item">
      <p class="costume-number">衣装 ③</p>
      <div class="costume-images single">
        <img src="メイド画像/画像④.jpg" alt="衣装③ 画像">
      </div>
      <div class="size-table">
        <span class="size-label">サイズ</span>
        <span class="size-value">フリーサイズ（M ~ L）</span>
      </div>
      <p class="costume-desc">
        全円のワンピース<br>
        <span class="note">※ 現状サンプル写真です</span>
      </p>
    </div>
  </div>
</body>
</html>
